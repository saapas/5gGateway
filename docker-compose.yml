version: "3.9"

services:
  mqtt-broker:
    image: emqx/emqx:latest
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "18083:18083"

  cloud-api:
    build: ./cloud
    volumes:
      - ./data:/data
    container_name: cloud-api
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"

  spark:
    build: ./spark
    volumes:
      - ./data:/data
    depends_on:
      - cloud-api

  gateway-01:
    build: ./gateway
    container_name: gateway-01
    environment:
      - PYTHONUNBUFFERED=1
      - GATEWAY_ID=gateway-01
    depends_on:
      - mqtt-broker
      - cloud-api
